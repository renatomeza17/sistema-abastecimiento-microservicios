server:
  port: 8761
spring:
  application:
    name: eureka-server
  config:
    import: ${SPRING_CONFIG_IMPORT:optional:configserver:http://config-server:8888}
    import: ${SPRING_CONFIG_IMPORT:optional:configserver:http://config-server:8888}
eureka:
  instance:
    hostname: eureka-server
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://eureka-server:${server.port}/eureka/