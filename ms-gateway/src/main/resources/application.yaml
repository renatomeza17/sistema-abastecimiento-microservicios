server:
  port: 8080

spring:
  application:
    name: ms-gateway
  cloud:
    config:
      enabled: false
    gateway:
      default-filters:
        - AddRequestHeader=X-Gateway-Request, true
      routes:
        - id: login
          uri: lb://ms-login
          #uri: https://ms-login-9l2y.onrender.com
          predicates:
            - Path=/login/**
          filters:
            - RewritePath=/login/(?<segment>.*), /api/login/${segment}
        - id: login-base
          uri: lb://ms-login
          #uri: https://ms-login-9l2y.onrender.com
          predicates:
            - Path=/login
          filters:
            - RewritePath=/login, /api/login
        - id: roles
          uri: lb://ms-login
          #uri: https://ms-login-9l2y.onrender.com
          predicates:
            - Path=/roles/**
          filters:
            - RewritePath=/roles/(?<segment>.*), /api/roles/${segment}
        - id: roles-base
          uri: lb://ms-login
          #uri: https://ms-login-9l2y.onrender.com
          predicates:
            - Path=/roles
          filters:
            - RewritePath=/roles, /api/roles
        - id: usuarios
          uri: lb://ms-login
          #uri: https://ms-login-9l2y.onrender.com
          predicates:
            - Path=/usuarios/**
          filters:
            - RewritePath=/usuarios/(?<segment>.*), /api/usuarios/${segment}
        - id: usuarios-base
          uri: lb://ms-login
          #uri: https://ms-login-9l2y.onrender.com
          predicates:
            - Path=/usuarios
          filters:
            - RewritePath=/usuarios, /api/usuarios

eureka:
  instance:
    prefer-ip-address: true
  client:
    register-with-eureka: false
    fetch-registry: false
    serviceUrl:
      defaultZone: http://eureka-server:8761/eureka

management:
  endpoints:
    web:
      exposure:
        include: gateway,health,info
