server:
  port: 8080

spring:
  application:
    name: ms-gateway
  cloud:
    config:
      enabled: false
    gateway:
      server:
        webflux:
          default-filters:
            - AddRequestHeader=X-Gateway-Request, true
          routes:
            - id: login
              uri: http://ms-login:8086
              predicates:
                - Path=/login, /login/**
              filters:
                - RewritePath=/login(?<segment>/?.*), /api/login${segment}
            - id: roles
              uri: http://ms-login:8086
              predicates:
                - Path=/roles, /roles/**
              filters:
                - RewritePath=/roles(?<segment>/?.*), /api/roles${segment}
            - id: usuarios
              uri: http://ms-login:8086
              predicates:
                - Path=/usuarios, /usuarios/**
              filters:
                - RewritePath=/usuarios(?<segment>/?.*), /api/usuarios${segment}
            - id: ordenes
              uri: http://ms-ordenes:8082
              predicates:
                - Path=/orden, /orden/**
              filters:
                - RewritePath=/orden(?<segment>/?.*), /api/ordenes${segment}
            - id: requerimiento
              uri: http://ms-requerimiento:8083
              predicates:
                - Path=/requerimiento, /requerimiento/**
              filters:
                - RewritePath=/requerimiento(?<segment>/?.*), /api/requerimientos${segment}
            - id: recepcion
              uri: http://ms-recepcion:8085
              predicates:
                - Path=/recepcion, /recepcion/**
              filters:
                - RewritePath=/recepcion(?<segment>/?.*), /api/pedidos-pendientes${segment}
            - id: pedidodependencia
              uri: http://ms-pedidodependencia:8084
              predicates:
                - Path=/pedidodependencia, /pedidodependencia/**
              filters:
                - RewritePath=/pedidodependencia(?<segment>/?.*), /api/dependencias${segment}
            - id: kardex
              uri: http://ms-kardex:8087
              predicates:
                - Path=/kardex, /kardex/**
              filters:
                - RewritePath=/kardex(?<segment>/?.*), /api/kardex${segment}
            - id: productos
              uri: http://ms-kardex:8087
              predicates:
                - Path=/productos, /productos/**
              filters:
                - RewritePath=/productos(?<segment>/?.*), /api/productos${segment}

eureka:
  instance:
    prefer-ip-address: true
  client:
    register-with-eureka: false
    fetch-registry: false
    serviceUrl:
      defaultZone: http://localhost:8761/eureka

management:
  endpoints:
    web:
      exposure:
        include: gateway,health,info,gateway.routes
