server:
  port: 8086

spring:
  application:
    name: ms-login
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://postgres-login:5432/loginDb
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect

springdoc:
  swagger-ui:
    path: /docs

eureka:
  instance:
    prefer-ip-address: true
  client:
    serviceUrl:
      defaultZone: http://eureka-server:8761/eureka