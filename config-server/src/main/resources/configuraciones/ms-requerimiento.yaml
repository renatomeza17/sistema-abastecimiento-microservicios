server:
  port: 8083

spring:
  application:
    name: ms-requerimiento
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://postgres-requerimiento:5432/requerimientoDb
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect

eureka:
  instance:
    prefer-ip-address: true
  client:
    serviceUrl:
      defaultZone: http://eureka-server:8761/eureka
