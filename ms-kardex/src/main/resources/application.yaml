server:
  port: 8087

spring:
  application:
    name: ms-kardex
  config:
    import: configserver:https://config-serve.onrender.com
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${KARDEX_DB_URL}
    username: ${KARDEX_DB_USERNAME}
    password: ${KARDEX_DB_PASSWORD}
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    show-sql: true
    hibernate:
      ddl-auto: update

springdoc:
  swagger-ui:
    path: /docs

eureka:
  client:
    service-url:
      defaultZone: https://sistema-abastecimiento-microservicios.onrender.com/eureka/