spring.application.name=ms-requerimiento
server.port=8083

# --- CockroachDB (protocolo compatible con PostgreSQL) ---
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:26257/sudab_requerimientos?sslmode=disable}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# ddl-auto=validate porque el esquema lo maneja Flyway (db/migration/V1__init.sql)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.CockroachDialect
spring.jpa.show-sql=false
spring.flyway.enabled=true

# --- Ecosistema Spring Cloud del proyecto ---
# Ajusta host/puerto si config-server / eureka-server no corren en localhost
eureka.client.service-url.defaultZone=${EUREKA_URI:http://localhost:8761/eureka}
eureka.instance.prefer-ip-address=true
spring.config.import=optional:configserver:${CONFIG_SERVER_URI:http://localhost:8888}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
