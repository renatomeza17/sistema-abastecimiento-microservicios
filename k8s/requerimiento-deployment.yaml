apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: ms-requerimiento
  name: ms-requerimiento
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: ms-requerimiento
  template:
    metadata:
      labels:
        io.kompose.service: ms-requerimiento
    spec:
      initContainers:
        - name: wait-for-services
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z -w 2 config-server 8888 && nc -z -w 2 eureka-server 8761; do
                echo "Waiting for config-server and eureka-server..."
                sleep 2
              done
      containers:
        - env:
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://eureka-server:8761/eureka/
            - name: SPRING_CONFIG_IMPORT
              value: optional:configserver:http://config-server:8888
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://cockroachdb:26257/sudab_requerimientos?sslmode=disable
            - name: SPRING_DATASOURCE_USERNAME
              value: root
            - name: SPRING_DATASOURCE_PASSWORD
              value: ""
          image: ms-requerimiento
          imagePullPolicy: IfNotPresent
          name: ms-requerimiento
          ports:
            - containerPort: 8083
              protocol: TCP
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      restartPolicy: Always
