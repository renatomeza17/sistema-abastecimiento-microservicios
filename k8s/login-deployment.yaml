apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: ms-login
  name: ms-login
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: ms-login
  template:
    metadata:
      labels:
        io.kompose.service: ms-login
    spec:
      initContainers:
        - name: wait-for-services
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z -w 2 config-server 8888 && nc -z -w 2 eureka-server 8761; do
                echo "Waiting for config-server and eureka-server..."
                sleep 2
              done
      containers:
        - env:
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://eureka-server:8761/eureka/
            - name: SPRING_CONFIG_IMPORT
              value: optional:configserver:http://config-server:8888
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: login-db-secret
                  key: url
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: login-db-secret
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: login-db-secret
                  key: password
            - name: TOKEN_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: login-jwt-secret
                  key: secret
          image: ms-login
          imagePullPolicy: IfNotPresent
          name: ms-login
          ports:
            - containerPort: 8086
              protocol: TCP
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8086
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8086
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8086
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      restartPolicy: Always
