apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yml
    kompose.version: 1.38.0
  labels:
    io.kompose.service: ms-kardex
  name: ms-kardex
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: ms-kardex
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-compose.yml
        kompose.version: 1.38.0
      labels:
        io.kompose.service: ms-kardex
    spec:
      initContainers:
        - name: wait-for-services
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z -w 2 config-server 8888 && nc -z -w 2 eureka-server 8761; do
                echo "Waiting for config-server and eureka-server..."
                sleep 2
              done
      containers:
        - env:
            # 1. Ajuste de Eureka y Config Server para el clúster interno de K8s
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://eureka-server:8761/eureka/
            - name: SPRING_CONFIG_IMPORT
              value: optional:configserver:http://config-server:8888
            
            # 2. Inyección de tus variables personalizadas de base de datos MySQL / Neon
            - name: KARDEX_DB_URL
              value: jdbc:mysql://uzn6j6ewvv5rkdhr:BDA2mnHZjAl4TvjomHAI@brpbk4ulyqt4w6flajqy-mysql.services.clever-cloud.com:3306/brpbk4ulyqt4w6flajqy
            - name: KARDEX_DB_USERNAME
              value: uzn6j6ewvv5rkdhr
            - name: KARDEX_DB_PASSWORD
              value: BDA2mnHZjAl4TvjomHAI
            - name: TOKEN_JWT_SECRET
              value: clave-super-secreta-sudab-desarrollo-local-1234567890
          image: ms-kardex
          imagePullPolicy: IfNotPresent
          name: ms-kardex
          ports:
            # CORRECCIÓN CLAVE: El puerto interno del contenedor ahora es 8087
            - containerPort: 8087
              protocol: TCP
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8087
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8087
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8087
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      restartPolicy: Always