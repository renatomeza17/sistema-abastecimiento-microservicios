apiVersion: v1
kind: PersistentVolume
metadata:
  name: db-recepcion-pv
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: /data/db-recepcion
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: db-recepcion-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
