version: '3.8'

services:
  config-server:
    build: ./config-server
    container_name: config-server
    ports:
      - "8888:8888"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8888"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - microservicios-proyecto_default

  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    depends_on:
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - microservicios-proyecto_default

  ms-gateway:
    build: ./ms-gateway
    container_name: ms-gateway
    ports:
      - "8080:8080"
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - microservicios-proyecto_default

  ms-ordenes:
    build: ./ms-ordenes
    container_name: ms-ordenes
    ports:
      - "8082:8082"
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - microservicios-proyecto_default

  ms-requerimiento:
    build: ./ms-requerimiento
    container_name: ms-requerimiento
    ports:
      - "8083:8083"
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - microservicios-proyecto_default

  ms-pedidodependencia:
    build: ./ms-pedidodependencia
    container_name: ms-pedidodependencia
    ports:
      - "8084:8084"
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - microservicios-proyecto_default

  postgres-recepcion:
    image: postgres:16-alpine
    container_name: postgres-recepcion
    environment:
      POSTGRES_DB: recepcionDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./db/Recepcion:/docker-entrypoint-initdb.d
      - postgres-recepcion-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - microservicios-proyecto_default

  ms-recepcion:
    build: ./ms-recepcion
    container_name: ms-recepcion
    ports:
      - "8085:8085"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-recepcion:5432/recepcionDb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres-recepcion:
        condition: service_healthy
    networks:
      - microservicios-proyecto_default

  ms-login:
    build: ./ms-login
    container_name: ms-login
    ports:
      - "8086:8086"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://ep-divine-bonus-acdcecau-pooler.sa-east-1.aws.neon.tech/logindb?sslmode=require&channel_binding=require
      SPRING_DATASOURCE_USERNAME: neondb_owner
      SPRING_DATASOURCE_PASSWORD: npg_b2rmGo7zMJYB
      TOKEN_JWT_SECRET: clave-super-secreta-sudab-2024-abastecimiento
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - microservicios-proyecto_default

volumes:
  postgres-recepcion-data:

networks:
  microservicios-proyecto_default:
    external: true