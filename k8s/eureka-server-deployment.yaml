apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yml
    kompose.version: 1.38.0
  labels:
    io.kompose.service: eureka-server
  name: eureka-server
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: eureka-server
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-compose.yml
        kompose.version: 1.38.0
      labels:
        io.kompose.service: eureka-server
    spec:
      initContainers:
        - name: wait-for-config-server
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z -w 2 config-server 8888; do
                echo "Waiting for config-server..."
                sleep 2
              done
      containers:
        - env:
            - name: SPRING_CONFIG_IMPORT
              value: optional:configserver:http://config-server:8888
          image: eureka-server
          imagePullPolicy: IfNotPresent
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - wget --no-verbose --tries=1 --spider http://localhost:8761/actuator/health || exit 1
            failureThreshold: 10
            periodSeconds: 10
            timeoutSeconds: 5
          name: eureka-server
          ports:
            - containerPort: 8761
              protocol: TCP
      restartPolicy: Always
