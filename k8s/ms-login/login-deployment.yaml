apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-login
  labels:
    app: ms-login
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ms-login
  template:
    metadata:
      labels:
        app: ms-login
    spec:
      initContainers:
        - name: wait-for-services
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z -w 2 config-server 8888 && nc -z -w 2 eureka-server 8761 && nc -z -w 2 db-login 5432; do
                echo "Esperando a config-server, eureka-server y db-login..."
                sleep 2
              done
      containers:
        - name: ms-login
          image: ms-login
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: ms-login-config
            - secretRef:
                name: ms-login-secret
          env:
            - name: JAVA_TOOL_OPTIONS
              value: "-Deureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/ -Dspring.config.import=optional:configserver:http://config-server:8888"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: db-login-secret
                  key: POSTGRES_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-login-secret
                  key: POSTGRES_PASSWORD
          ports:
            - containerPort: 8086
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8086
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8086
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8086
            periodSeconds: 15
      restartPolicy: Always
