apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yml
    kompose.version: 1.38.0
  labels:
    io.kompose.service: ms-gateway
  name: ms-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: ms-gateway
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-compose.yml
        kompose.version: 1.38.0
      labels:
        io.kompose.service: ms-gateway
    spec:
      initContainers:
        - name: wait-for-services
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z -w 2 config-server 8888 && nc -z -w 2 eureka-server 8761; do
                echo "Waiting for config-server and eureka-server..."
                sleep 2
              done
      containers:
        - env:
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://eureka-server:8761/eureka
            - name: SPRING_CONFIG_IMPORT
              value: optional:configserver:http://config-server:8888
          image: ms-gateway
          imagePullPolicy: IfNotPresent
          name: ms-gateway
          ports:
            - containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 80
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 80
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      restartPolicy: Always
