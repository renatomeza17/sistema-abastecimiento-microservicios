apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yml
    kompose.version: 1.38.0
  labels:
    io.kompose.service: ms-ordenes
  name: ms-ordenes
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: ms-ordenes
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-compose.yml
        kompose.version: 1.38.0
      labels:
        io.kompose.service: ms-ordenes
    spec:
      initContainers:
        - name: wait-for-services
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z -w 2 config-server 8888 && nc -z -w 2 eureka-server 8761; do
                echo "Waiting for config-server and eureka-server..."
                sleep 2
              done
      containers:
        - env:
            # 1. Variables de Infraestructura (Sincronizadas con el Clúster K8s)
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://eureka-server:8761/eureka/
            - name: SPRING_CONFIG_IMPORT
              value: optional:configserver:http://config-server:8888
            
            # 2. Inyección de tus variables de Base de Datos (Railway) y Seguridad JWT
            - name: ORDENES_DB_URL
              value: jdbc:mysql://root:IVpoOqzJtOWzWdpeEjZdIChPXoKzXRSq@tokaido.proxy.rlwy.net:17509/railway?useSSL=false&allowPublicKeyRetrieval=true
            - name: ORDENES_DB_USERNAME
              value: root
            - name: ORDENES_DB_PASSWORD
              value: IVpoOqzJtOWzWdpeEjZdIChPXoKzXRSq
            - name: TOKEN_JWT_SECRET
              value: clave-super-secreta-sudab-desarrollo-local-1234567890
          image: ms-ordenes
          imagePullPolicy: IfNotPresent
          name: ms-ordenes
          ports:
            # Sincronizado exactamente con tu puerto 8082
            - containerPort: 8082
              protocol: TCP
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      restartPolicy: Always