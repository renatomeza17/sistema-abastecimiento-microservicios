apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yml
    kompose.version: 1.38.0
  labels:
    io.kompose.service: ms-recepcion
  name: ms-recepcion
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: ms-recepcion
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-compose.yml
        kompose.version: 1.38.0
      labels:
        io.kompose.service: ms-recepcion
    spec:
      initContainers:
        - name: wait-for-services
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z -w 2 config-server 8888 && nc -z -w 2 eureka-server 8761; do
                echo "Waiting for config-server and eureka-server..."
                sleep 2
              done
      containers:
        - env:
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://eureka-server:8761/eureka
            - name: SPRING_CONFIG_IMPORT
              value: optional:configserver:http://config-server:8888
            - name: SPRING_DATASOURCE_PASSWORD
              value: npg_b2rmGo7zMJYB
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://ep-divine-bonus-acdcecau-pooler.sa-east-1.aws.neon.tech/neondb?sslmode=require
            - name: SPRING_DATASOURCE_USERNAME
              value: neondb_owner
          image: ms-recepcion
          imagePullPolicy: IfNotPresent
          name: ms-recepcion
          ports:
            - containerPort: 8085
              protocol: TCP
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8085
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8085
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8085
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      restartPolicy: Always
